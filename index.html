<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Buzz Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --text:#f5f7fb;
      --muted:#d6dde8;
      --accent:#ff9800;
      --accent2:#ffbf66;
      --card:rgba(10,12,18,0.80);
      --border:rgba(255,255,255,0.12);
    }

    body{
      font-family:'Inter',sans-serif;
      background:#0b0d12;
      color:var(--text);
    }

    button,input{
      font-family:inherit;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .page{
      min-height:100vh;
      background:url("Mealbuzzpartner.jpg") center/cover no-repeat;
      position:relative;
      display:flex;
      flex-direction:column;
    }

    .page::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.10) 38%, rgba(0,0,0,0.34) 72%, rgba(0,0,0,0.72) 100%);
      pointer-events:none;
    }

    .topbar{
      position:relative;
      z-index:2;
      width:min(1180px,100%);
      margin:0 auto;
      padding:20px 16px 0;
      display:flex;
      justify-content:flex-end;
    }

    .lang-switch{
      display:inline-flex;
      gap:6px;
      padding:6px;
      border-radius:18px;
      background:rgba(10,12,18,0.34);
      border:1px solid rgba(255,255,255,0.14);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      box-shadow:0 10px 26px rgba(0,0,0,0.18);
    }

    .lang-btn{
      border:none;
      background:transparent;
      color:#fff;
      padding:10px 16px;
      border-radius:12px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
    }

    .lang-btn.active{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      color:#fff;
    }

    .hero{
      position:relative;
      z-index:2;
      width:min(1180px,100%);
      margin:0 auto;
      padding:54px 16px 14px;
      flex:1;
      display:flex;
      align-items:flex-end;
    }

    .hero-box{
      width:min(760px,100%);
    }

    .main-title{
      font-family:'Poppins',sans-serif;
      font-size:clamp(40px,9vw,78px);
      line-height:0.98;
      margin-bottom:12px;
      font-weight:800;
      letter-spacing:-1.4px;
      background:linear-gradient(90deg,#ffffff 0%, #fff4e8 30%, #ffd699 58%, #ffb347 76%, #ff9800 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      text-shadow:0 8px 30px rgba(0,0,0,0.18);
    }

    .portal{
      font-size:13px;
      letter-spacing:4px;
      text-transform:uppercase;
      color:#eef3fa;
      font-weight:800;
      text-shadow:0 4px 20px rgba(0,0,0,0.22);
    }

    .login-wrap{
      position:relative;
      z-index:3;
      width:min(1180px,100%);
      margin:0 auto;
      padding:0 16px 28px;
    }

    .login-card{
      width:min(520px,100%);
      margin-left:auto;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:28px;
      padding:22px;
      box-shadow:0 18px 48px rgba(0,0,0,0.34);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .login-title{
      font-family:'Poppins',sans-serif;
      font-size:30px;
      margin-bottom:8px;
    }

    .login-subtitle{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      margin-bottom:18px;
    }

    .form{
      display:grid;
      gap:12px;
    }

    .input{
      width:100%;
      padding:15px 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.09);
      color:#fff;
      font-size:15px;
      outline:none;
    }

    .input::placeholder{
      color:rgba(255,255,255,0.72);
    }

    .input:focus{
      border-color:rgba(255,179,71,0.65);
      box-shadow:0 0 0 3px rgba(255,152,0,0.10);
    }

    .login-btn,.register-btn{
      width:100%;
      padding:15px 16px;
      border:none;
      border-radius:16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }

    .login-btn{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      color:#fff;
      box-shadow:0 12px 28px rgba(255,152,0,0.22);
    }

    .register-btn{
      background:rgba(255,255,255,0.10);
      color:#fff;
      border:1px solid rgba(255,255,255,0.14);
    }

    .status{
      min-height:22px;
      font-size:14px;
      color:#9ff0bb;
      margin-top:4px;
    }

    .status.error{
      color:#ffb3b3;
    }

    .bottom-note{
      margin-top:16px;
      color:#d6dde7;
      font-size:13px;
      line-height:1.7;
      text-align:center;
    }

    .footer{
      margin-top:10px;
      text-align:center;
      color:#cfd7e3;
      font-size:12px;
    }

    @media (max-width:900px){
      .hero{
        padding:44px 16px 10px;
        min-height:46vh;
      }

      .login-wrap{
        padding-bottom:22px;
      }

      .login-card{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="topbar">
      <div class="lang-switch">
        <button class="lang-btn active" id="mrBtn" onclick="setLanguage('mr')">मराठी</button>
        <button class="lang-btn" id="enBtn" onclick="setLanguage('en')">English</button>
      </div>
    </div>

    <section class="hero">
      <div class="hero-box">
        <div class="main-title">Meal Buzz Partner</div>
        <div class="portal" id="portalText">OWNER PORTAL</div>
      </div>
    </section>

    <section class="login-wrap">
      <div class="login-card">
        <div class="login-title" id="loginTitle">Owner Login</div>
        <div class="login-subtitle" id="loginSubtitle">तुमच्या नोंदणीकृत नंबर आणि पासवर्डने लॉगिन करा.</div>

        <div class="form">
          <input type="text" id="ownerPhone" class="input" placeholder="नोंदणीकृत मोबाइल नंबर">
          <input type="password" id="ownerPassword" class="input" placeholder="पासवर्ड">

          <button class="login-btn" id="loginBtn" onclick="ownerLogin()">Login</button>

          <a href="register.html">
            <button class="register-btn" type="button" id="registerBtn">New Partner? Register Your Mess</button>
          </a>

          <div class="status" id="loginStatus"></div>
        </div>

        <div class="bottom-note" id="bottomNote">एकदा नोंदणी झाल्यावर याच नंबरने लॉगिन करा.</div>
        <div class="footer">© 2026 Meal Buzz Partner</div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://iinvhwsbnvmcujyrzlxe.supabase.co";
    const SUPABASE_KEY = "sb_publishable_fwhxfVqWpDrro8hkQbQQRA_1crMexZv";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const translations = {
      mr: {
        htmlLang: "mr",
        portalText: "OWNER PORTAL",
        loginTitle: "Owner Login",
        loginSubtitle: "तुमच्या नोंदणीकृत नंबर आणि पासवर्डने लॉगिन करा.",
        phonePlaceholder: "नोंदणीकृत मोबाइल नंबर",
        passwordPlaceholder: "पासवर्ड",
        loginBtn: "Login",
        registerBtn: "New Partner? Register Your Mess",
        bottomNote: "एकदा नोंदणी झाल्यावर याच नंबरने लॉगिन करा.",
        fillFields: "कृपया मोबाइल नंबर आणि पासवर्ड भरा.",
        loggingIn: "Logging in...",
        loginError: "लॉगिन करताना अडचण आली.",
        wrongCreds: "मोबाइल नंबर किंवा पासवर्ड चुकीचा आहे.",
        success: "लॉगिन यशस्वी 🎉"
      },
      en: {
        htmlLang: "en",
        portalText: "OWNER PORTAL",
        loginTitle: "Owner Login",
        loginSubtitle: "Login with your registered mobile number and password.",
        phonePlaceholder: "Registered mobile number",
        passwordPlaceholder: "Password",
        loginBtn: "Login",
        registerBtn: "New Partner? Register Your Mess",
        bottomNote: "Once registered, use the same number to login.",
        fillFields: "Please enter mobile number and password.",
        loggingIn: "Logging in...",
        loginError: "There was a problem while logging in.",
        wrongCreds: "Wrong mobile number or password.",
        success: "Login successful 🎉"
      }
    };

    let currentLang = localStorage.getItem("partnerLang") || "mr";

    function setLoginStatus(message, isError = false) {
      const box = document.getElementById("loginStatus");
      box.innerText = message;
      box.className = isError ? "status error" : "status";
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("partnerLang", lang);
      const t = translations[lang];

      document.documentElement.lang = t.htmlLang;
      document.getElementById("portalText").innerText = t.portalText;
      document.getElementById("loginTitle").innerText = t.loginTitle;
      document.getElementById("loginSubtitle").innerText = t.loginSubtitle;
      document.getElementById("ownerPhone").placeholder = t.phonePlaceholder;
      document.getElementById("ownerPassword").placeholder = t.passwordPlaceholder;
      document.getElementById("loginBtn").innerText = t.loginBtn;
      document.getElementById("registerBtn").innerText = t.registerBtn;
      document.getElementById("bottomNote").innerText = t.bottomNote;

      document.getElementById("mrBtn").classList.toggle("active", lang === "mr");
      document.getElementById("enBtn").classList.toggle("active", lang === "en");
    }

    const savedOwnerPhone = localStorage.getItem("ownerPhone");
    if (savedOwnerPhone) {
      document.getElementById("ownerPhone").value = savedOwnerPhone;
    }

    async function ownerLogin() {
      const t = translations[currentLang];
      const phone = document.getElementById("ownerPhone").value.trim();
      const password = document.getElementById("ownerPassword").value.trim();

      if (!phone || !password) {
        setLoginStatus(t.fillFields, true);
        return;
      }

      setLoginStatus(t.loggingIn);

      const { data, error } = await sb
        .from("mess")
        .select("*")
        .eq("contact", phone)
        .eq("password", password)
        .limit(1);

      if (error) {
        setLoginStatus(t.loginError, true);
        return;
      }

      if (!data || data.length === 0) {
        setLoginStatus(t.wrongCreds, true);
        return;
      }

      const owner = data[0];
      localStorage.setItem("ownerPhone", phone);
      localStorage.setItem("ownerMessId", owner.id);
      localStorage.setItem("ownerMessName", owner.name || "");

      setLoginStatus(t.success);

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 500);
    }

    setLanguage(currentLang);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Buzz Partner - Owner Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --text:#f5f7fb;
      --muted:#cfd6e2;
      --accent:#ff9800;
      --accent2:#ffbf66;
      --card:rgba(12,15,22,0.84);
      --line:rgba(255,255,255,0.12);
      --ok:#8df0b5;
      --danger:#ffb3b3;
    }

    body{
      font-family:'Inter',sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at top right, rgba(255,152,0,0.10), transparent 22%),
        linear-gradient(180deg,#0b0d12 0%, #131924 100%);
    }

    button,input,textarea{font-family:inherit}
    a{text-decoration:none;color:inherit}

    .page{
      width:min(980px,100%);
      margin:0 auto;
      padding:18px 16px 28px;
      display:grid;
      gap:18px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .brand h1{
      font-family:'Poppins',sans-serif;
      font-size:34px;
      line-height:1;
      background:linear-gradient(90deg,#ffffff 0%, #fff4e8 30%, #ffd699 58%, #ffb347 76%, #ff9800 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    .brand p{
      margin-top:6px;
      font-size:12px;
      font-weight:800;
      letter-spacing:3px;
      color:#e9eef6;
      text-transform:uppercase;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:20px;
      box-shadow:0 18px 44px rgba(0,0,0,0.24);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .section-title{
      font-family:'Poppins',sans-serif;
      font-size:24px;
      margin-bottom:8px;
    }

    .section-sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      margin-bottom:16px;
    }

    .form-grid{
      display:grid;
      gap:14px;
    }

    .field-group{
      display:grid;
      gap:8px;
    }

    .label{
      font-size:12px;
      font-weight:800;
      letter-spacing:1px;
      text-transform:uppercase;
      color:#ffcc80;
    }

    .input,.textarea,.file-input{
      width:100%;
      padding:14px 15px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.06);
      color:#fff;
      font-size:14px;
      outline:none;
    }

    .textarea{
      min-height:100px;
      resize:vertical;
      line-height:1.7;
    }

    .save-btn,.back-btn{
      border:none;
      cursor:pointer;
      border-radius:14px;
      font-weight:800;
      padding:14px 18px;
      font-size:15px;
    }

    .save-btn{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      color:#fff;
    }

    .save-btn:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .back-btn{
      background:rgba(255,255,255,0.05);
      color:#fff;
      border:1px solid var(--line);
    }

    .status{
      min-height:22px;
      font-size:14px;
      color:var(--ok);
      margin-top:8px;
    }

    .status.error{
      color:var(--danger);
    }

    @media(min-width:820px){
      .form-grid{
        grid-template-columns:1fr 1fr;
      }
      .full{
        grid-column:1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <h1>Meal Buzz Partner</h1>
        <p>Owner Profile</p>
      </div>
      <a href="dashboard.html"><button class="back-btn" type="button">Back</button></a>
    </div>

    <div class="card">
      <div class="section-title">Edit Your Mess Details</div>
      <div class="section-sub">इथे profile details बदलता येतील.</div>

      <div class="form-grid">
        <div class="field-group">
          <div class="label">Owner Name</div>
          <input type="text" id="ownerName" class="input" placeholder="Owner name">
        </div>

        <div class="field-group">
          <div class="label">Mobile Number</div>
          <input type="text" id="contact" class="input" placeholder="Mobile number" maxlength="15">
        </div>

        <div class="field-group">
          <div class="label">Mess Name</div>
          <input type="text" id="messName" class="input" placeholder="Mess name">
        </div>

        <div class="field-group">
          <div class="label">Price</div>
          <input type="text" id="price" class="input" placeholder="Price">
        </div>

        <div class="field-group full">
          <div class="label">Address / Location</div>
          <textarea id="location" class="textarea" placeholder="Address"></textarea>
        </div>

        <div class="field-group full">
          <div class="label">Change Main Image (optional)</div>
          <input type="file" id="mainImage" class="file-input" accept="image/*">
        </div>

        <div class="field-group full">
          <button class="save-btn" id="saveBtn" onclick="saveProfile()" type="button">Save Changes</button>
          <div class="status" id="statusText"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://iinvhwsbnvmcujyrzlxe.supabase.co";
    const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentMessId = null;
    let currentUserId = null;

    function setStatus(message, isError = false){
      const box = document.getElementById("statusText");
      box.innerText = message;
      box.className = isError ? "status error" : "status";
    }

    function setSaveDisabled(disabled){
      document.getElementById("saveBtn").disabled = disabled;
    }

    function normalizePhone(phone){
      return phone.replace(/\D/g, "");
    }

    async function getCurrentMess(){
      const { data: authData, error: authError } = await sb.auth.getUser();

      if (!authError && authData?.user) {
        currentUserId = authData.user.id;

        const { data: messByUser, error: messError } = await sb
          .from("mess")
          .select("id, user_id, owner_name, contact, name, price, location, image_url")
          .eq("user_id", currentUserId)
          .single();

        if (!messError && messByUser) {
          currentMessId = messByUser.id;
          localStorage.setItem("ownerMessId", messByUser.id);
          localStorage.setItem("ownerUserId", currentUserId);
          return messByUser;
        }
      }

      const ownerMessId = localStorage.getItem("ownerMessId");
      if (!ownerMessId) return null;

      const { data: messById, error: messByIdError } = await sb
        .from("mess")
        .select("id, user_id, owner_name, contact, name, price, location, image_url")
        .eq("id", Number(ownerMessId))
        .single();

      if (messByIdError || !messById) return null;

      currentMessId = messById.id;
      currentUserId = messById.user_id || null;
      return messById;
    }

    async function loadProfile(){
      setStatus("Loading profile...");

      const data = await getCurrentMess();

      if (!data) {
        setStatus("Could not load profile. Please login again.", true);
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);
        return;
      }

      document.getElementById("ownerName").value = data.owner_name || "";
      document.getElementById("contact").value = data.contact || "";
      document.getElementById("messName").value = data.name || "";
      document.getElementById("price").value = data.price || "";
      document.getElementById("location").value = data.location || "";

      setStatus("");
    }

    async function uploadMainImage(file){
      if (!file) return null;

      const cleanName = file.name.replace(/\s+/g, "-");
      const fileName = `profile-${Date.now()}-${cleanName}`;

      const { error: uploadError } = await sb.storage
        .from("mess-images")
        .upload(fileName, file, {
          cacheControl: "3600",
          upsert: false
        });

      if (uploadError) {
        console.log("Upload error:", uploadError);
        return { error: true, message: uploadError.message };
      }

      const { data: publicData } = sb.storage
        .from("mess-images")
        .getPublicUrl(fileName);

      return publicData?.publicUrl || null;
    }

    async function saveProfile(){
      const ownerName = document.getElementById("ownerName").value.trim();
      const contact = normalizePhone(document.getElementById("contact").value.trim());
      const messName = document.getElementById("messName").value.trim();
      const price = document.getElementById("price").value.trim();
      const location = document.getElementById("location").value.trim();
      const mainImageFile = document.getElementById("mainImage").files[0];

      if (!ownerName || !contact || !messName || !price || !location) {
        setStatus("Please fill all details.", true);
        return;
      }

      if (contact.length < 10) {
        setStatus("Please enter a valid mobile number.", true);
        return;
      }

      if (!currentMessId) {
        setStatus("Mess ID not found. Please login again.", true);
        return;
      }

      setSaveDisabled(true);

      try {
        let imageUrl = null;

        if (mainImageFile) {
          setStatus("Uploading image...");
          imageUrl = await uploadMainImage(mainImageFile);

          if (imageUrl && imageUrl.error) {
            setStatus(imageUrl.message || "Image upload failed.", true);
            setSaveDisabled(false);
            return;
          }
        }

        setStatus("Saving profile...");

        const payload = {
          owner_name: ownerName,
          contact: contact,
          name: messName,
          price: price,
          location: location
        };

        if (imageUrl) payload.image_url = imageUrl;

        let query = sb.from("mess").update(payload);

        if (currentUserId) {
          query = query.eq("user_id", currentUserId);
        } else {
          query = query.eq("id", Number(currentMessId));
        }

        const { error } = await query;

        if (error) {
          setStatus("Save failed: " + error.message, true);
          setSaveDisabled(false);
          return;
        }

        localStorage.setItem("ownerPhone", contact);
        localStorage.setItem("ownerMessName", messName);
        localStorage.setItem("ownerMessId", currentMessId);

        setStatus("Profile updated successfully.");
        setSaveDisabled(false);

      } catch (err) {
        console.log("Unexpected error:", err);
        setStatus(err.message || "Something went wrong.", true);
        setSaveDisabled(false);
      }
    }

    loadProfile();
  </script>
</body>
</html>
